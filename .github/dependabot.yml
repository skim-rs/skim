version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(dev-deps)
    groups:
      cargo-prod:
        dependency-type: production
      cargo-dev:
        dependency-type: development
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: monthly
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(dev-deps)
    exclude-paths:
      - .github/workflows/release.yml
    groups:
      gha-prod:
        dependency-type: production
      gha-dev:
        dependency-type: development
